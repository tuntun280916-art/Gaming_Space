<!DOCTYPE html>

<head>

    <title>Productos - Gaming Space</title>
    <link rel="stylesheet" href="css/styles.css">

<body>
    <header>

    <nav class="navbar">

            <li><a href="index.html">Inicio</a></li>

        <section class="products-section">
            <h2>Catálogo de Productos</h2>
