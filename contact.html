<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Contactanos - Gaming Space</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/pages/contact.css">
</head>
<body>
    <header>
        <h1>🎮 Gaming Space</h1>
        <p>Tu tienda de componentes y periféricos gamer</p>
    </header>

    <nav class="navbar">
        <ul class="nav-menu">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="products.html">Productos</a></li>
            <li><a href="cart.html">Carrito <span id="cart-count">(0)</span></a></li>
            <li><a href="contact.html" class="active">Contactanos</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <main>
        <section class="contact-section">
        <h2>FAQ</h2>
        
        <div class="container-fluid">
      <h1>Envía un mensaje</h1>
      <div class="row fw-bold font-monospace justify-content-center">
        <div class="col-6 img-thumbnail bg-transparent mb-4">
          <form>
            <div class="row">
              <div class="form-outline mb-4 mt-2 col-4">
                <label class="form-label" for="user">Username</label>
                <input type="text" id="user" class="form-control" placeholder="Benito" />
              </div>
              <div class="form-outline mb-4 mt-2 col-8">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="todopro@gmail.com"/>
              </div>
            <div class="form-outline mb-4 w-100">
              <label class="form-label" for="message">Mensaje</label>
              <textarea class="form-control" id="message" rows="8"></textarea>
            </div>
              <button
                type="submit"
                class="btn btn-primary btn-block col-5 col-md-4"
              >
                Enviar
              </button>
            </div>
          </form>
        </div>

        </section>
    </main>

        <footer>
        <p>&copy; 2026 Gaming Space. Todos los derechos reservados.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/shop-system.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/products.js"></script>
</body>
</html>
